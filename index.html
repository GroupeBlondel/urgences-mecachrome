<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mecachrome — Urgences</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0D1B3E; --blue:#1B5EA6; --blue-l:#D6E8FA;
  --orange:#C45911; --orange-l:#FCE4D6;
  --green:#1E7145; --red:#C0392B; --red-l:#FADBD8;
  --yellow-l:#FEF9E7; --green-l:#D5F5E3;
  --gray:#F4F6F9; --gray2:#E8ECF1; --muted:#6C757D;
  --white:#FFFFFF; --input:#EBF4FF; --text:#1A1A2E;
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--gray); color:var(--text); min-height:100vh; }

nav { background:var(--navy); display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; position:sticky; top:0; z-index:100; }
.nav-logo { color:#fff; font-weight:700; }
.nav-tabs { display:flex; gap:4px; }
.nav-tab { background:none; border:none; color:rgba(255,255,255,0.6); font-size:13px; font-weight:600; padding:8px 16px; border-radius:6px; cursor:pointer; }
.nav-tab.active { background:var(--blue); color:#fff; }
.nav-tab.tab-orange.active { background:var(--orange); }

.page { display:none; padding:32px 24px; max-width:800px; margin:0 auto; }
.page.active { display:block; }
.page-full { display:none; padding:24px; }
.page-full.active { display:block; }

.form-card { background:var(--white); border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
.form-header { background:var(--navy); padding:28px 32px; color:#fff; }
.form-header h1 { font-size:22px; }
.form-body { padding:24px 32px; }
.field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.field label { font-size:13px; font-weight:600; }
.field input, .field select { border:2px solid var(--gray2); border-radius:8px; padding:10px 14px; font-size:14px; width:100%; }
.field input.error { border-color:var(--red); background:var(--red-l); }
.section-hidden { display:none; }
.btn-send { width:100%; background:var(--green); color:#fff; border:none; border-radius:10px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-send:disabled { background:var(--muted); }

.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:#fff; padding:14px 28px; border-radius:50px; font-size:15px; font-weight:600; transition:transform .3s ease; z-index:999; }
.toast.error-toast { background:var(--red); }
.toast.show { transform:translateX(-50%) translateY(0); }

.screen-header { padding:20px 24px 16px; display:flex; align-items:center; justify-content:space-between; }
.screen-header h2 { font-size:20px; color:var(--navy); }
.count { background:var(--red-l); color:var(--red); font-size:13px; font-weight:700; padding:4px 12px; border-radius:50px; }
.count.none { background:var(--green-l); color:var(--green); }

.table-wrap { background:var(--white); border-radius:12px; overflow:hidden; margin:0 24px 24px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:500px; }
thead tr { background:var(--navy); }
thead th { color:#fff; font-size:12px; font-weight:700; padding:14px 16px; text-align:left; white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--gray2); }
tbody tr.done td { color:var(--muted); text-decoration:line-through; }
tbody td { padding:12px 16px; font-size:13px; }
.statut-sel { border:1px solid var(--gray2); border-radius:6px; padding:5px 8px; font-size:12px; cursor:pointer; }
.empty-state { text-align:center; padding:60px 24px; color:var(--muted); }
.debug { background:#000; color:#0f0; font-family:monospace; font-size:11px; padding:8px; margin:0 24px 12px; border-radius:6px; max-height:120px; overflow-y:auto; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">MECACHROME</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('formulaire')">Formulaire MK</button>
    <button class="nav-tab tab-orange" onclick="showPage('reception')">Réception</button>
    <button class="nav-tab tab-orange" onclick="showPage('expedition')">Expédition</button>
  </div>
</nav>

<div id="page-formulaire" class="page active">
  <div class="form-card">
    <div class="form-header"><h1>Demande d'urgence</h1></div>
    <div class="form-body">
      <div class="field">
        <label>Type de demande *</label>
        <select id="f-type" onchange="toggleSections()">
          <option value="">-- Choisir --</option>
          <option value="Reception">Réception</option>
          <option value="Expedition">Expédition</option>
        </select>
      </div>
      <div class="field">
        <label>Opérateur MK *</label>
        <input id="f-oper" type="text" placeholder="Votre prénom et nom">
      </div>

      <div id="section-rec" class="section-hidden">
        <div class="field"><label>CFR (commande) *</label><input id="f-cfr" type="text"></div>
        <div class="field"><label>STT / FRS *</label><input id="f-stt" type="text"></div>
        <div class="field"><label>OF</label><input id="f-ofr" type="text"></div>
      </div>

      <div id="section-exp" class="section-hidden">
        <div class="field"><label>CDECLI ou CFR *</label><input id="f-cde" type="text"></div>
        <div class="field"><label>Destinataire *</label><input id="f-dest" type="text"></div>
        <div class="field">
          <label>Mode d'expédition *</label>
          <select id="f-mode">
            <option value="">-- Choisir --</option>
            <option>Top H</option><option>Navette</option><option>DHL</option><option>Autre</option>
          </select>
        </div>
        <div class="field"><label>BL</label><input id="f-bl" type="text"></div>
        <div class="field"><label>OF</label><input id="f-ofe" type="text"></div>
      </div>

      <button class="btn-send" id="btn-send" onclick="envoyer()">Envoyer la demande</button>
    </div>
  </div>
</div>

<div id="page-reception" class="page-full">
  <div class="screen-header">
    <h2>Urgences Réception</h2>
    <span class="count" id="count-rec">—</span>
  </div>
  <div class="debug" id="debug-rec">en attente...</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>Opérateur</th><th>CFR</th><th>STT/FRS</th><th>OF</th><th>Statut</th></tr></thead>
      <tbody id="tbody-rec"></tbody>
    </table>
    <div id="empty-rec" class="empty-state" style="display:none">Aucune urgence en cours</div>
  </div>
</div>

<div id="page-expedition" class="page-full">
  <div class="screen-header">
    <h2>Urgences Expédition</h2>
    <span class="count" id="count-exp">—</span>
  </div>
  <div class="debug" id="debug-exp">en attente...</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>Opérateur</th><th>CDECLI/CFR</th><th>OF</th><th>BL</th><th>Destinataire</th><th>Mode</th><th>Statut</th></tr></thead>
      <tbody id="tbody-exp"></tbody>
    </table>
    <div id="empty-exp" class="empty-state" style="display:none">Aucune urgence en cours</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADzKq1tH8KPlKJDWfNSTSf3voF0WtmRgM",
  authDomain: "application-urgences-mk.firebaseapp.com",
  databaseURL: "https://application-urgences-mk-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "application-urgences-mk",
  storageBucket: "application-urgences-mk.firebasestorage.app",
  messagingSenderId: "1024128466750",
  appId: "1:1024128466750:web:998745e6c9ff5e1ca3766f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const refRec = ref(db, 'urgences_reception');
const refExp = ref(db, 'urgences_expedition');

window.showPage = function(name) {
  document.querySelectorAll('.page,.page-full').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  if (name==='formulaire') tabs[0].classList.add('active');
  if (name==='reception')  tabs[1].classList.add('active');
  if (name==='expedition') tabs[2].classList.add('active');
};

window.toggleSections = function() {
  const typ = document.getElementById('f-type').value;
  document.getElementById('section-rec').className = typ==='Reception' ? '' : 'section-hidden';
  document.getElementById('section-exp').className = typ==='Expedition' ? '' : 'section-hidden';
};

window.envoyer = async function() {
  document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
  const typ  = document.getElementById('f-type').value;
  const oper = document.getElementById('f-oper').value.trim();
  if (!typ)  { document.getElementById('f-type').classList.add('error'); return; }
  if (!oper) { document.getElementById('f-oper').classList.add('error'); return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;

  const now = new Date();
  const date = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

  try {
    if (typ === 'Reception') {
      const cfr = document.getElementById('f-cfr').value.trim();
      const stt = document.getElementById('f-stt').value.trim();
      const ofr = document.getElementById('f-ofr').value.trim();
      if (!cfr) { document.getElementById('f-cfr').classList.add('error'); btn.disabled=false; return; }
      if (!stt) { document.getElementById('f-stt').classList.add('error'); btn.disabled=false; return; }
      await push(refRec, { date: date, oper: oper, cfr: cfr, stt: stt, ofr: ofr, statut: 'A traiter' });
      toast('Réception envoyée !');
    } else {
      const cde  = document.getElementById('f-cde').value.trim();
      const dest = document.getElementById('f-dest').value.trim();
      const mode = document.getElementById('f-mode').value;
      const bl   = document.getElementById('f-bl').value.trim();
      const ofe  = document.getElementById('f-ofe').value.trim();
      if (!cde)  { document.getElementById('f-cde').classList.add('error'); btn.disabled=false; return; }
      if (!dest) { document.getElementById('f-dest').classList.add('error'); btn.disabled=false; return; }
      if (!mode) { document.getElementById('f-mode').classList.add('error'); btn.disabled=false; return; }
      await push(refExp, { date: date, oper: oper, cde: cde, ofe: ofe, bl: bl, dest: dest, mode: mode, statut: 'A traiter' });
      toast('Expédition envoyée !');
    }
    ['f-type','f-oper','f-cfr','f-stt','f-ofr','f-cde','f-dest','f-mode','f-bl','f-ofe']
      .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    toggleSections();
  } catch(e) {
    toast('Erreur: ' + e.message, true);
  }
  btn.disabled = false;
};

function renderTable(snapshotVal, tbodyId, emptyId, countId, columns) {
  const tbody = document.getElementById(tbodyId);
  const empty = document.getElementById(emptyId);
  const countEl = document.getElementById(countId);

  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  if (!snapshotVal) {
    empty.style.display = 'block';
    countEl.textContent = '0 en attente';
    countEl.className = 'count none';
    return [];
  }

  const keys = Object.keys(snapshotVal);
  const items = keys.map(function(k) {
    const obj = snapshotVal[k];
    obj.key = k;
    return obj;
  });

  items.sort(function(a, b) { return a.key < b.key ? 1 : -1; });

  const pendingCount = items.filter(function(d) { return d.statut !== 'Traite'; }).length;
  countEl.textContent = pendingCount + ' en attente';
  countEl.className = pendingCount === 0 ? 'count none' : 'count';

  if (items.length === 0) {
    empty.style.display = 'block';
    return items;
  }
  empty.style.display = 'none';

  for (let i = 0; i < items.length; i++) {
    const d = items[i];
    const tr = document.createElement('tr');
    if (d.statut === 'Traite') tr.className = 'done';

    for (let j = 0; j < columns.length; j++) {
      const td = document.createElement('td');
      td.textContent = d[columns[j]] || '';
      tr.appendChild(td);
    }

    const tdStatut = document.createElement('td');
    const sel = document.createElement('select');
    sel.className = 'statut-sel';
    const statuts = ['A traiter', 'En cours', 'Traite'];
    for (let s = 0; s < statuts.length; s++) {
      const opt = document.createElement('option');
      opt.value = statuts[s];
      opt.textContent = statuts[s];
      if (d.statut === statuts[s]) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.dataset.key = d.key;
    tdStatut.appendChild(sel);
    tr.appendChild(tdStatut);

    tbody.appendChild(tr);
  }

  return items;
}

onValue(refRec, function(snapshot) {
  const val = snapshot.val();
  const items = renderTable(val, 'tbody-rec', 'empty-rec', 'count-rec', ['date','oper','cfr','stt','ofr']);
  document.getElementById('debug-rec').textContent = 'Firebase: ' + (val ? Object.keys(val).length : 0) + ' entrees | Affichees: ' + items.length;

  document.querySelectorAll('#tbody-rec .statut-sel').forEach(function(sel) {
    sel.addEventListener('change', function() {
      update(ref(db, 'urgences_reception/' + sel.dataset.key), { statut: sel.value });
    });
  });
});

onValue(refExp, function(snapshot) {
  const val = snapshot.val();
  const items = renderTable(val, 'tbody-exp', 'empty-exp', 'count-exp', ['date','oper','cde','ofe','bl','dest','mode']);
  document.getElementById('debug-exp').textContent = 'Firebase: ' + (val ? Object.keys(val).length : 0) + ' entrees | Affichees: ' + items.length;

  document.querySelectorAll('#tbody-exp .statut-sel').forEach(function(sel) {
    sel.addEventListener('change', function() {
      update(ref(db, 'urgences_expedition/' + sel.dataset.key), { statut: sel.value });
    });
  });
});

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = err ? 'toast error-toast show' : 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}
</script>
</body>
</html>
